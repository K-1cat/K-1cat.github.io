<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI-101 | VTuber基礎</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f7f8ff;
      color: #333;
    }

    .main {
      padding: 40px 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 20px;
    }

    .label {
      font-weight: bold;
      color: #4a5bdc;
      margin-top: 15px;
      display: block;
    }

    .highlight {
      background: #f0f2ff;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* subtle ARG hint */
    .note {
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>

<body data-page="programs">

  <!-- layout.js -->
  <div id="vai-topbar"></div>

  <div id="main-content">
    <div id="vai-navbar"></div>
    <div class="main">

      <h1>VAI-101｜VTuber基礎</h1>
      <div class="meta">担当：橘 恵介</div>

      <div class="card">
        <span class="label">■ 基本情報</span>
        <p>単位数：2単位｜必修｜1年次前期</p>
        <p>授業形式：実習＋ライブ配信演習</p>

        <span class="label">■ 概要</span>
        <p>
          配信環境構築・基本操作・初期配信設計を
          実践形式で習得する。
        </p>

        <span class="label">■ 評価方法</span>
        <div class="highlight">
          <p>配信課題：60%</p>
          <p>出席：20%</p>
          <p>最終配信：20%</p>
        </div>

        <span class="label">■ 備考</span>
        <p>
          授業中は教員も同時配信を行う。
        </p>

        <!-- subtle worldbuilding -->
        <div class="note">
          ※ 一部の配信ログは記録対象外となる場合があります。
        </div>
      </div>

      <!-- Optional: link back -->
      <div class="card">
        <a href="/programs/">← プログラム一覧へ戻る</a>
      </div>

    </div>
  </div>

  <div id="vai-footer"></div>

  <script src="/layout.js"></script>
</body>
</html>
