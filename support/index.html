<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAI - サポート</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: white;
    color: #333;
}

/* TOP BAR */
.topbar {
    background: #4a5bdc;
    color: white;
    padding: 10px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.9em;
}

.logo {
    font-size: 1.5em;
    font-weight: bold;
    color: #4a5bdc;
}

/* HEADER */
.header {
    padding: 40px 50px;
}

.header h1 {
    font-size: 2.5em;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px 50px;
}

/* CARD */
.card {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 12px;
}

/* FORM */
.form {
    padding: 20px 50px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: inherit;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4a5bdc;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* FOOTER */
.footer {
    background: #f0f2ff;
    padding: 20px;
    text-align: center;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div>VAI | Virtual Academy Institution</div>
    <div>
        <a href="/">ホーム</a>
        <a href="/login/" id="portal-link">ログイン</a>
        <a href="/support/">サポート</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>🛠 サポート</h1>
    <p>VAIのシステムや活動に関するお問い合わせはこちらからご連絡ください。</p>
</div>

<!-- SUPPORT OPTIONS -->
<div class="grid">

    <div class="card">
        <h3>📘 よくある質問</h3>
        <p>アカウント、配信環境、プログラム内容に関するよくある質問をまとめています。</p>
    </div>

    <div class="card">
        <h3>🧑‍💻 技術サポート</h3>
        <p>配信トラブルや機材に関する問題について、専門スタッフが対応します。</p>
    </div>

    <div class="card">
        <h3>📩 お問い合わせ</h3>
        <p>個別の質問や相談がある場合は、下記フォームからご連絡ください。</p>
    </div>

</div>

<!-- CONTACT FORM -->
<div class="form">
    <h2>お問い合わせフォーム</h2>

    <label>お名前</label>
    <input type="text" placeholder="例：山田 太郎"><br><br>

    <label>メールアドレス</label>
    <input type="email" placeholder="example@email.com"><br><br>

    <label>お問い合わせ内容</label>
    <textarea rows="5" placeholder="内容をご記入ください"></textarea>

    <button>送信</button>
</div>

<div class="footer">
    © 2026 Virtual Academy Institution（VAI）
</div>

</body>

<script>
const role = localStorage.getItem("vai_role");

const link = document.getElementById("portal-link");
const user = localStorage.getItem("vai_user");

if (role === "student") {
    document.querySelector(".topbar div").innerText = "VAI | Student Access";
    link.innerText = user + "｜ポータル";
    link.href = "/dashboard/";
}
</script>
</html>
