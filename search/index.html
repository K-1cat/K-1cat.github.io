<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI - 検索</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: white; color: #333; }

    .search-wrap { max-width: 700px; padding: 50px 50px 60px; }
    .search-wrap h1 { font-size: 2em; margin: 0 0 24px; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    .search-bar input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #ccd;
      border-radius: 8px;
      font-size: 1em;
      background: white;
      color: #333;
    }
    .search-bar input:focus { outline: none; border-color: #4a5bdc; }
    .search-bar button {
      padding: 11px 20px;
      background: #4a5bdc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }
    .search-bar button:hover { background: #3a4bc8; }

    #search-results { font-size: 0.95em; color: #444; line-height: 2; }

    .result-item {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item a { color: #4a5bdc; text-decoration: none; font-weight: 600; }
    .result-item a:hover { text-decoration: underline; }
    .result-item p { margin: 2px 0 0; font-size: 0.9em; color: #666; }

    .no-results { color: #888; font-size: 0.95em; }

    .result-locked {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
      opacity: 0.7;
    }
    .result-locked .locked-title {
      font-weight: 600;
      color: #999;
      cursor: default;
      user-select: none;
    }
    .result-locked .locked-path {
      font-size: 0.85em;
      color: #bbb;
      font-family: monospace;
      margin: 2px 0 0;
    }
    .result-locked .locked-badge {
      display: inline-block;
      font-size: 0.75em;
      background: #f5e0e0;
      color: #a00;
      border: 1px solid #e0b0b0;
      border-radius: 4px;
      padding: 1px 7px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div id="vai-topbar"></div>
  <div id="main-content">
    <div id="vai-navbar"></div>

    <div class="search-wrap">
      <h1>🔍 サイト内検索</h1>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="キーワードを入力してください" oninput="doSearch()">
        <button onclick="doSearch()">検索</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>
  <div id="vai-footer"></div>
  <script src="/layout.js"></script>
  <script>
    /* Simple client-side search over known pages.
       Add more entries here as you add pages to the site.
       ARG tip: you could add a hidden entry that only appears
       for a specific secret keyword. */
    const PAGES = [
      { title: 'キャンパスライフ',       href: '/',            text: 'VAI VTuber コミュニティ ワークショップ メンター /' },
      { title: 'プログラム',             href: '/programs/',   text: 'VTuber基礎 キャラクターデザイン パフォーマンス理論 コラボ 映像編集 音声 programs VAI-101 VAI-178 VAI-203 VAI-214 VAI-250 VAI-310' },
      { title: '学生一覧',               href: '/students/',   text: '85Yen たんばりん 春風チェリー Redvil 在校生 students' },
      { title: '卒業生',                 href: '/alumni/',     text: '秋刀魚屋 Dadandy 伊豆の語り子 卒業 alumni' },
      { title: 'イベント一覧',           href: '/events/',     text: '6月 講義 実習 ワークショップ コラボ 発表 ゲスト 星川ユナ events' },
      { title: 'ログイン',               href: '/login/',      text: 'ログイン パスワード 学生ポータル 認証 login' },
      { title: 'サポート',               href: '/support/',    text: 'サポート FAQ よくある質問 機材 問い合わせ support' },
      { title: '配信 - Redvil',         href: '/streams/redvil/',         text: 'Redvil 配信 ゲーム RV-0214 streams' },
      { title: '配信 - 85Yen',          href: '/streams/85yen/',          text: '85Yen たんばりん 配信 YN-1572 streams' },
      { title: '配信 - 伊豆の語り子',   href: '/streams/izunokatariko/',  text: '伊豆の語り子 朗読 IK-8329 streams' },
      { title: '教員',                  href: '/faculty/',                text: '教員 スタッフ 講師 先生 faculty' },
    ];

    const STUDENT_PAGES = [
      { title: '学長講演資料 — 「存在証明」国際シンポジウム2024', href: '/events/expo2024/', trigger: '存在証明' },
      { title: '学長講演資料 — 「存在証明」国際シンポジウム2024', href: '/events/expo2024/', trigger: '観測と自己同一性' },
      { title: '学長講演資料 — 「存在証明」国際シンポジウム2024', href: '/events/expo2024/', trigger: '画面の向こう側で生きること' },
      { title: '学長講演資料 — 「存在証明」国際シンポジウム2024', href: '/events/expo2024/', trigger: 'デジタル空間における存在証明' },
      { title: '学長講演資料 — 「存在証明」国際シンポジウム2024', href: '/events/expo2024/', trigger: 'events/expo2024' },
      { title: '地下1階 — アクセス制限エリア', href: '/b1-access/', trigger: 'b1-access' },
    ];

    const CLASS_PAGES = [
      { title: 'VAI-101 — VTuber基礎',           href: '/programs/vai-101/', text: 'vai-101 vtuber基礎 橘 恵介 配信 必修 1年次' },
      { title: 'VAI-178 — キャラクターデザイン', href: '/programs/vai-178/', text: 'vai-178 キャラクター デザイン 藤本 梨沙 アバター 選択必修' },
      { title: 'VAI-203 — パフォーマンス理論',   href: '/programs/vai-203/', text: 'vai-203 パフォーマンス 理論 水野 明 演技 演じる 必修' },
      { title: 'VAI-214 — コラボ配信実習',        href: '/programs/vai-214/', text: 'vai-214 コラボ 配信 実習 田中 恒一 グループ 必修' },
      { title: 'VAI-241 — 視聴者心理学',          href: '/programs/vai-241/', text: 'vai-241 視聴者 心理学 黒田 進 観測 依存' },
      { title: 'VAI-301 — クロスチャンネル戦略', href: '/programs/vai-301/', text: 'vai-301 クロスチャンネル 戦略 田中 恒一 プラットフォーム' },
      { title: 'VAI-310 — 音声表現・朗読/歌唱',  href: '/programs/vai-310/', text: 'vai-310 音声 朗読 歌唱 音無 零 オンライン' },
      { title: 'VAI-399 — 観測と存在（上級）',   href: '/programs/vai-399/', text: 'vai-399 観測 存在 黒田 進 選抜 上級' },
    ];

    function doSearch() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const out = document.getElementById('search-results');
      if (!q) { out.innerHTML = ''; return; }

      let html = '';

      if (q.includes('vault')) {
        html += `
          <div class="result-locked">
            <span class="locked-title">🔒 VAULT<span class="locked-badge">アクセス権限未達</span></span>
            <p class="locked-path">このリソースへのアクセスは許可されていません。</p>
          </div>`;
      }

      const isStudent = localStorage.getItem('vai_role') === 'student';

      const results = PAGES.filter(p =>
        p.title.toLowerCase().includes(q) || p.text.toLowerCase().includes(q)
      );

      const lockedResults = STUDENT_PAGES.filter(p => q === p.trigger);

      if (!isStudent) {
        lockedResults.forEach(p => {
          html += `
            <div class="result-locked">
              <span class="locked-title">🔒 ${p.title}<span class="locked-badge">アクセス権限未達</span></span>
              <p class="locked-path">このリソースへのアクセスは許可されていません。</p>
            </div>`;
        });
      } else {
        lockedResults.forEach(p => results.push(p));
      }

      const matchingClasses = CLASS_PAGES.filter(p =>
        p.title.toLowerCase().includes(q) || p.text.toLowerCase().includes(q)
      );

      if (!isStudent) {
        matchingClasses.forEach(p => {
          html += `
            <div class="result-locked">
              <span class="locked-title">🔒 ${p.title}<span class="locked-badge">学生専用</span></span>
              <p class="locked-path">ログインが必要です。</p>
            </div>`;
        });
      } else {
        matchingClasses.forEach(p => results.push(p));
      }

      if (results.length === 0 && !html) {
        out.innerHTML = `<p class="no-results">「${q}」に一致するページは見つかりませんでした。</p>`;
        return;
      }

      html += results.map(r => `
        <div class="result-item">
          <a href="${r.href}">${r.title}</a>
          <p>${r.href}</p>
        </div>
      `).join('');

      out.innerHTML = html;
    }

    // Support ?q= in URL
    const params = new URLSearchParams(location.search);
    if (params.get('q')) {
      document.getElementById('search-input').value = params.get('q');
      doSearch();
    }
  </script>
</body>
</html>
