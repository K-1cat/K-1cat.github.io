<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI - Redvil 配信</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: white;
      color: #333;
    }

    .container { padding: 40px 50px; }

    .stream-nav {
      padding: 10px 30px;
      font-size: 0.85em;
      color: #888;
      border-bottom: 1px solid #eee;
    }
    .stream-box {
      background: #000;
      color: #fff;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 3px solid #333;
      box-shadow: 0 0 0 1px #555, 0 8px 24px rgba(0,0,0,0.4);
    }
    .stream-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .meta {
      color: #777;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .chat {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 12px;
    }
    .chat p { margin: 8px 0; }

    .comment-section {
      margin-top: 30px;
    }
    .comment-section h2 { font-size: 1.1em; margin-bottom: 12px; }
    .comment-disabled {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
      color: #aaa;
      font-size: 0.9em;
    }
    .comment-disabled .icon { font-size: 1.8em; margin-bottom: 8px; }
    .comment-disabled p { margin: 4px 0; }
  </style>
</head>
<body data-page="">

  <div id="vai-topbar"></div>
  <div id="main-content">
    <div class="stream-nav">VAI &rsaquo; 在校生配信</div>
    
    <div class="container">
      <h1>無題 <span style="display:inline-block;background:#c0392b;color:white;font-size:0.45em;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:0.1em;vertical-align:middle;margin-left:8px;">● LIVE</span></h1>
      <div class="meta">
        配信メディア: VAI.sys<br>
        配信開始：<span id="stream-start"></span><br>
        Stream ID：RV-0214
      </div>
      <div class="stream-box">
        <img id="stream-img" src="stream.jpg" alt="Redvil stream">
      </div>

      <div class="comment-section">
        <h2>💬 コメント</h2>
        <div class="comment-disabled">
          <div class="icon">🚫</div>
          <p><strong>この配信ではコメントは利用できません。</strong></p>
          <p>コメント機能はこの配信に対して無効化されています。</p>
        </div>
      </div>
    </div>

  </div>
  <div id="vai-footer"></div>
  <script src="/layout.js"></script>
  <script>
    const navLinks = document.querySelector('#vai-navbar .nav-links');
    if (navLinks) navLinks.textContent = '在校生配信';

    document.getElementById('stream-start').textContent = '05/02　07:21';

    const hintSent = localStorage.getItem('hint_mail_sent') ||
                     (JSON.parse(localStorage.getItem('hint_mail_requests') || '[]').length > 0);
    if (hintSent) {
      document.getElementById('stream-img').src = 'stream-hint.jpg';
    }
  </script>
</body>
</html>
