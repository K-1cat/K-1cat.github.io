<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI - Redvil 配信</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: white;
      color: #333;
    }

    .container { padding: 40px 50px; }

    .stream-nav {
      padding: 10px 30px;
      font-size: 0.85em;
      color: #888;
      border-bottom: 1px solid #eee;
    }
    .stream-box {
      background: #000;
      color: #fff;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .stream-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .meta {
      color: #777;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .chat {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 12px;
    }
    .chat p { margin: 8px 0; }
  </style>
</head>
<body data-page="">

  <div id="vai-topbar"></div>
  <div id="main-content">
    <div class="stream-nav">VAI &rsaquo; 在校生配信</div>
    
    <div class="container">
      <h1>💻 VAI-399 授業中継</h1>
      <div class="meta">
        配信メディア: VAI.sys<br>
        配信開始：<span id="stream-start"></span><br>
        Stream ID：RV-0214
      </div>
      <div class="stream-box">
        <img src="redvil-stream.jpg" alt="Redvil stream">
      </div>
      <p>非公開</p>

      <h2>💬 チャット</h2>
      <div class="chat">
        <p><b>system:</b> この配信は非公開です。</p>
        <p><b>system:</b> 外部アクセスは記録されます。</p>
      </div>
    </div>

  </div>
  <div id="vai-footer"></div>
  <script src="/layout.js"></script>
  <script>
    const navLinks = document.querySelector('#vai-navbar .nav-links');
    if (navLinks) navLinks.textContent = '在校生配信';

    const start = new Date(Date.now() - (13 * 60 + 42) * 60 * 1000);
    const mm = String(start.getMonth() + 1).padStart(2, '0');
    const dd = String(start.getDate()).padStart(2, '0');
    const hh = String(start.getHours()).padStart(2, '0');
    const mi = String(start.getMinutes()).padStart(2, '0');
    document.getElementById('stream-start').textContent = `${mm}/${dd}　${hh}:${mi}`;
  </script>
</body>
</html>
