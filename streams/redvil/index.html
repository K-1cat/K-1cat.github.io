<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI - 配信アクセス</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: white; color: #333; }

    .stream-nav {
      padding: 10px 30px;
      font-size: 0.85em;
      color: #888;
      border-bottom: 1px solid #eee;
    }

    .stream-wrap {
      max-width: 500px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }

    .lock-icon { font-size: 3em; margin-bottom: 16px; }

    .stream-wrap h1 { font-size: 1.5em; margin: 0 0 8px; }
    .stream-wrap p { color: #666; font-size: 0.95em; margin: 0 0 28px; }

    .step-label {
      font-size: 0.75em;
      font-weight: 600;
      color: #4a5bdc;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .code-input {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .code-input input {
      padding: 10px 16px;
      border: 1px solid #ccd;
      border-radius: 8px;
      font-size: 1em;
      width: 200px;
      text-align: center;
      letter-spacing: 0.1em;
      background: white;
      color: #333;
    }
    .code-input input:focus { outline: none; border-color: #4a5bdc; }
    .code-input button {
      padding: 10px 20px;
      background: #4a5bdc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }
    .code-input button:hover { background: #3a4bc8; }

    .error-msg { color: #c0392b; font-size: 0.85em; display: none; margin-bottom: 10px; }

    .stream-meta {
      margin-top: 40px;
      font-size: 0.8em;
      color: #aaa;
      font-family: monospace;
      line-height: 1.8;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .gate { display: none; }
    .gate.active { display: block; }
  </style>
</head>
<body>
  <div id="vai-topbar"></div>
  <div id="main-content">
    <div class="stream-nav">VAI &rsaquo; 在校生配信</div>

    <div class="stream-wrap">
      <div class="lock-icon">🔒</div>
      <h1>配信アクセス制限</h1>
      <p>この配信は非公開に設定されています。<br>アクセスするには段階的な本人確認が必要です。</p>

      <!-- STAGE 1: Program code -->
      <div class="gate" id="gate-1">
        <div class="step-label">ステップ 1 / 3 — プログラム確認</div>
        <p style="margin-bottom:16px;">この配信が属するVAIプログラムのコード番号を入力してください。</p>
        <div class="code-input">
          <input type="text" id="input-1" placeholder="VAI-???">
          <button onclick="checkStage1()">確認</button>
        </div>
        <div class="error-msg" id="err-1">コードが正しくありません。</div>
      </div>

      <!-- STAGE 2: Instructor -->
      <div class="gate" id="gate-2">
        <div class="step-label">ステップ 2 / 3 — 担当教員確認</div>
        <p style="margin-bottom:16px;">そのプログラムの担当教員の苗字を入力してください。</p>
        <div class="code-input">
          <input type="text" id="input-2" placeholder="担当教員">
          <button onclick="checkStage2()">確認</button>
        </div>
        <div class="error-msg" id="err-2">正しくありません。</div>
      </div>

      <!-- STAGE 3: Access code -->
      <div class="gate" id="gate-3">
        <div class="step-label">ステップ 3 / 3 — 認証コード</div>
        <p style="margin-bottom:16px;">この配信にアクセスするには認証コードが必要です。</p>
        <div class="code-input">
          <input type="text" id="input-3" placeholder="認証コード" maxlength="12">
          <button onclick="checkStage3()">接続</button>
        </div>
        <div class="error-msg" id="err-3">認証コードが正しくありません。</div>
      </div>

      <div class="stream-meta">
        Stream ID: RV-0214<br>
        <span class="status-dot"></span>Status: ACTIVE
      </div>
    </div>

  </div>
  <div id="vai-footer"></div>
  <script>
    if (localStorage.getItem('vai_role') === 'student') {
      location.replace('/streams/redvil/live/');
    }
  </script>
  <script src="/layout.js"></script>
  <script>
    const STAGE_KEY = 'redvil_stream_stage';

    function showStage(n) {
      document.querySelectorAll('.gate').forEach(g => g.classList.remove('active'));
      const el = document.getElementById('gate-' + n);
      if (el) el.classList.add('active');
    }

    function getStage() {
      const val = localStorage.getItem(STAGE_KEY);
      if (val === 'done') return 3;
      return parseInt(val || '1');
    }

    // Stage 1 — program code: VAI-399 or just 399
    document.getElementById('input-1').addEventListener('keydown', e => { if (e.key === 'Enter') checkStage1(); });
    function checkStage1() {
      const val = document.getElementById('input-1').value.trim().toUpperCase().replace('VAI-', '');
      if (val === '399') {
        localStorage.setItem(STAGE_KEY, '2');
        showStage(2);
      } else {
        document.getElementById('err-1').style.display = 'block';
        document.getElementById('input-1').value = '';
      }
    }

    // Stage 2 — instructor surname: 黒田 or kuroda
    document.getElementById('input-2').addEventListener('keydown', e => { if (e.key === 'Enter') checkStage2(); });
    function checkStage2() {
      const val = document.getElementById('input-2').value.trim().toLowerCase();
      if (val === '黒田' || val === '黒田進' || val === 'kuroda') {
        localStorage.setItem(STAGE_KEY, '3');
        showStage(3);
      } else {
        document.getElementById('err-2').style.display = 'block';
        document.getElementById('input-2').value = '';
      }
    }

    // Stage 3 — access code
    const CORRECT_CODE = '3990214';
    document.getElementById('input-3').addEventListener('keydown', e => { if (e.key === 'Enter') checkStage3(); });
    function checkStage3() {
      const val = document.getElementById('input-3').value.trim().toUpperCase();
      if (val === CORRECT_CODE) {
        localStorage.setItem(STAGE_KEY, 'done');
        setTimeout(() => { location.href = '/streams/redvil/live/'; }, 400);
      } else {
        document.getElementById('err-3').style.display = 'block';
        document.getElementById('input-3').value = '';
      }
    }

    // Restore progress
    const stage = getStage();
    if (stage === 'done' || stage >= 3) {
      showStage(3);
    } else {
      showStage(stage);
    }
  </script>
</body>
</html>
