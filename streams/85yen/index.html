<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAI - 配信アクセス</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #333;
}

/* TOP BAR */
.topbar {
    background: #4a5bdc;
    color: white;
    padding: 10px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.9em;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 1.5em;
    font-weight: bold;
    color: #4a5bdc;
}
    
/* CENTER BOX */
.container {
    max-width: 500px;
    margin: 100px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
}

/* TITLE */
h1 {
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 80%;
    padding: 10px;
    margin-top: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4a5bdc;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* MESSAGE */
.message {
    margin-top: 20px;
    color: red;
    font-size: 0.9em;
}

/* SUBTEXT */
.sub {
    margin-top: 15px;
    font-size: 0.85em;
    color: #777;
}
</style>
</head>

<body>
<!-- TOP BAR -->
<div class="topbar">
    <div>VAI | Virtual Academy Institution</div>
    <div>
        <a href="/">ホーム</a>
        <a href="/login/" id="portal-link">ログイン</a>
        <a href="/support/">サポート</a>
        <a href="/search/">検索</a>
    </div>
</div>
    
<!-- NAV -->
<div class="navbar">
    <div class="logo">VAI</div>
    <div>在校生配信</div>
</div>

<div class="container">

    <h1>🔒 配信アクセス制限</h1>

    <p>
        この配信は非公開に設定されています。<br>
        アクセスするには認証コードが必要です。
    </p>

    <input type="text" id="code" placeholder="認証コードを入力">

    <br>
    <button onclick="unlock()">接続</button>

    <div class="message" id="msg"></div>

    <div class="sub">
        Stream ID: YN-1572<br>
        Status: ACTIVE
    </div>

</div>

<script>
const role = localStorage.getItem("vai_role");

const link = document.getElementById("portal-link");
const user = localStorage.getItem("vai_user");

if (role === "student") {
    document.querySelector(".topbar div").innerText = "VAI | Student Access";
    link.innerText = user + "｜ポータル";
    link.href = "/dashboard/";
}

let attempts = 0;

function unlock() {
    const input = document.getElementById("code").value;
    attempts++;

    if (input === "2141572") {
        window.location.href = "/streams/85yen/live/index.html";
    } else {
        if (attempts > 2) {
            document.getElementById("msg").innerText = "認証に失敗しました。\nアクセスログが記録されました。";
        } else {
            document.getElementById("msg").innerText = "認証に失敗しました。";
        }
    }
}
</script>

</body>
</html>
