<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAI - 伊豆の語り子 配信</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: white;
    color: #333;
}

/* NAV */
.navbar {
    padding: 15px 30px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
}

.logo {
    font-weight: bold;
    color: #4a5bdc;
}

/* STREAM */
.container {
    padding: 40px 50px;
}

.stream-box {
    background: #000;
    color: #fff;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* META */
.meta {
    color: #777;
    font-size: 0.9em;
    margin-bottom: 20px;
}

/* CHAT */
.chat {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 12px;
}

.chat p {
    margin: 8px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo">VAI</div>
    <div>卒業生配信</div>
</div>

<div class="container">

    <h1>📖 伊豆の語り子 - 朗読配信</h1>

    <div class="meta">
        配信日：06/03　21:14<br>
        アーカイブ番号：#214
    </div>

    <div class="stream-box">
        ▶ 配信アーカイブ再生中…
    </div>

    <p>
        静かな語り口で物語を紡ぐ配信。視聴者は音声に集中するため、
        画面の演出は最小限に抑えられている。
    </p>

    <h2>💬 チャットリプレイ</h2>

    <div class="chat">
        <p><b>viewer_12:</b> 今日の話すごい良い</p>
        <p><b>viewer_03:</b> 時間ぴったりだね</p>
        <p><b>izu:</b> 21:14に始めるのが好きなんです</p>
        <p><b>viewer_08:</b> 前回も同じ時間じゃなかった？</p>
        <p><b>izu:</b> うん、だいたい同じリズムでやってます</p>
    </div>

</div>

</body>
</html>
