<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAI - ログイン</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: white;
      color: #333;
    }

    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
      padding: 40px 20px;
    }

    .login-box {
      background: #f9f9ff;
      border: 1px solid #dde;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-box h2 {
      margin: 0 0 6px;
      font-size: 1.4em;
      color: #4a5bdc;
    }

    .login-box .subtitle {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 28px;
    }

    .login-box label {
      display: block;
      font-size: 0.85em;
      color: #555;
      margin-bottom: 5px;
    }

    .login-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd;
      border-radius: 8px;
      font-size: 1em;
      margin-bottom: 18px;
      box-sizing: border-box;
      background: white;
      color: #333;
    }

    .login-box input:focus {
      outline: none;
      border-color: #4a5bdc;
    }

    .login-btn {
      width: 100%;
      padding: 11px;
      background: #4a5bdc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }

    .login-btn:hover { background: #3a4bc8; }

    .forgot {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.85em;
      color: #4a5bdc;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }

    .error-msg {
      color: #c0392b;
      font-size: 0.85em;
      margin-bottom: 12px;
      display: none;
    }

    .version {
      text-align: center;
      font-size: 0.75em;
      color: #bbb;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="vai-topbar"></div>

  <div class="login-wrapper">
    <div class="login-box">
      <h2>VAI ログイン</h2>
      <p class="subtitle">学生専用ポータル｜アクセスログは記録されます</p>

      <div class="error-msg" id="error-msg">IDまたはパスワードが正しくありません。</div>

      <label for="username">ユーザーID</label>
      <input type="text" id="username" placeholder="例：yt0000" autocomplete="username">

      <label for="password">パスワード</label>
      <input type="password" id="password" autocomplete="current-password">

      <button class="login-btn" onclick="handleLogin()">ログイン</button>

      <a href="#" class="forgot" onclick="handleForgot(event)">パスワードをお忘れですか？</a>

      <div class="version">Secure Access v2.1</div>
    </div>
  </div>

  <div id="vai-footer"></div>

  <script src="/layout.js"></script>
  <script>
    /*
      ARG LOGIN LOGIC
      ---------------
      Edit VALID_CREDENTIALS below to set the correct password(s).
      The username can be anything — or lock it to a specific ID.

      On success: sets localStorage vai_role + vai_user, redirects to /dashboard/
      On failure: shows the error message (classic fake login behaviour)

      You can also add multiple valid accounts as an array.
    */

    const VALID_CREDENTIALS = [
      { user: 'at4607', password: 'Tono0128' },
      // add more entries here if you want multiple valid logins
    ];

    function handleLogin() {
      const inputUser = document.getElementById('username').value.trim();
      const inputPass = document.getElementById('password').value;
      const errorEl   = document.getElementById('error-msg');

      const match = VALID_CREDENTIALS.find(
        c => c.user === inputUser && c.password === inputPass
      );

      if (match) {
        errorEl.style.display = 'none';
        localStorage.setItem('vai_user', inputUser);
        localStorage.setItem('vai_role', 'student');
        // Small delay so it feels like a real auth round-trip
        setTimeout(() => { location.href = '/dashboard/'; }, 600);
      } else {
        errorEl.style.display = 'block';
        document.getElementById('password').value = '';
      }
    }

    // Allow pressing Enter in the password field
    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

    function handleForgot(e) {
      e.preventDefault();
      // ARG hook: you could redirect to a puzzle page here
      alert('パスワード設定時に記録したヒントをご確認ください。');
    }
  </script>
</body>
</html>
