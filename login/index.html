<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAI - ログイン</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding-top: 100px;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    display: inline-block;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background: #4a5bdc;
    color: white;
    border: none;
    border-radius: 8px;
}

.msg {
    margin-top: 10px;
    color: red;
}
</style>
</head>

<body>

<div class="box">
    <h2>VAI ログイン</h2>

    <input id="id" placeholder="ID">
    <input id="pw" placeholder="パスワード" type="password">

    <button onclick="login()">ログイン</button>

    <div class="msg" id="msg"></div>
</div>

<script>
function login() {
    const id = document.getElementById("id").value;
    const pw = document.getElementById("pw").value;

    // Redvil credentials
    if (id === "Redvil" && pw === "Tono0128") {
        localStorage.setItem("vai_role", "student");
        localStorage.setItem("vai_user", "redvil");
        window.location.href = "/";
    } else {
        document.getElementById("msg").innerText = "ログインに失敗しました";
    }
}
</script>

</body>
</html>
