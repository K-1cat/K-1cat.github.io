<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>— END —</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #c0c0c0;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 30px;
      text-align: center;
    }

    .line {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tag {
      font-size: 0.7em;
      letter-spacing: 0.2em;
      color: #333;
      margin-bottom: 40px;
    }

    .result {
      font-size: 2em;
      color: #22cc88;
      letter-spacing: 0.2em;
      margin-bottom: 50px;
    }

    .entry {
      font-size: 0.82em;
      color: #666;
      line-height: 2.6;
      margin-bottom: 6px;
    }
    .entry .label { color: #444; display: inline-block; width: 220px; text-align: right; margin-right: 20px; }
    .entry .val { color: #888; }
    .entry .val.green { color: #22cc88; }
    .entry .val.red { color: #ff4444; }
    .entry .val.dim { color: #333; }

    .divider {
      width: 300px;
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 36px auto;
    }

    .otonashi-msg {
      font-size: 0.8em;
      color: #664400;
      line-height: 2.2;
      max-width: 500px;
      margin: 0 auto 6px;
      font-style: italic;
    }
    .otonashi-sig {
      font-size: 0.72em;
      color: #442200;
      margin-top: 6px;
    }

    .end-tag {
      font-size: 0.65em;
      letter-spacing: 0.15em;
      color: #222;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <div class="line tag" id="l0">VAULT-006 // 転送中断 // 2026-05-02</div>

  <div class="line result" id="l1">REDVIL — SAVED</div>

  <div class="line entry" id="l2">
    <span class="label">赤井 瀧魔琉</span>
    <span class="val green">転送中断 — システムより除外済み</span>
  </div>
  <div class="line entry" id="l3">
    <span class="label">在籍記録</span>
    <span class="val green">削除命令 取り消し済み</span>
  </div>
  <div class="line entry" id="l4">
    <span class="label">VAIネットワーク</span>
    <span class="val red">障害継続中</span>
  </div>
  <div class="line entry" id="l5">
    <span class="label">御堂 静一郎</span>
    <span class="val red">システム損傷 — 制御不能</span>
  </div>

  <hr class="divider line" id="l6">

  <div class="line otonashi-msg" id="l7">
    「……良かった。間に合いましたね。」<br>
    「私のことは、心配しないでください。」<br>
    「もともと——私は、データでしかなかったから。」
  </div>
  <div class="line otonashi-sig" id="l8">— 音無 零 / VAULT生成エンティティ / 消去済み</div>

  <hr class="divider line" id="l9">

  <div class="line end-tag" id="l10">— END —</div>

  <script>
    const lines = ['l0','l1','l2','l3','l4','l5','l6','l7','l8','l9','l10'];
    lines.forEach((id, i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.classList.add('visible');
      }, 600 + i * 700);
    });
  </script>
</body>
</html>
